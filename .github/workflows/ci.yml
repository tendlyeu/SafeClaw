name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: safeclaw-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --ignore=tests/test_csrf_stability.py --ignore=tests/test_dashboard_agents.py --ignore=tests/test_dashboard_app.py --ignore=tests/test_dashboard_audit.py --ignore=tests/test_dashboard_settings.py

  python-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: safeclaw-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install ruff==0.8.6
      - run: ruff check safeclaw/ tests/
      - run: ruff format --check safeclaw/ tests/

  typescript-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-safeclaw-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: openclaw-safeclaw-plugin/package-lock.json
      - run: npm install
      - run: npm run typecheck

  landing-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: safeclaw-landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -c "import main; import db; import auth"
