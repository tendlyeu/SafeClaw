services:
  safeclaw:
    build:
      context: ./safeclaw-service
      dockerfile: Dockerfile
    container_name: safeclaw
    restart: unless-stopped
    ports:
      - "8420:8420"
    volumes:
      - safeclaw-data:/home/safeclaw/.safeclaw
      - landing-data:/shared-db
    environment:
      - SAFECLAW_HOST=0.0.0.0
      - SAFECLAW_PORT=8420
      - SAFECLAW_LOG_LEVEL=INFO
      - SAFECLAW_DATA_DIR=/home/safeclaw/.safeclaw
      - SAFECLAW_RUN_REASONER_ON_STARTUP=true
      - SAFECLAW_CORS_ORIGIN_REGEX=https?://.*
      - SAFECLAW_REQUIRE_AUTH=true
      - SAFECLAW_DB_PATH=/shared-db/safeclaw.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - coolify.managed=true

  landing:
    build:
      context: ./safeclaw-landing
      dockerfile: Dockerfile
    container_name: safeclaw-landing
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      - landing-data:/app/data
    environment:
      - SAFECLAW_DB_DIR=/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - coolify.managed=true

volumes:
  safeclaw-data:
  landing-data:
